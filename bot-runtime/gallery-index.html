<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Preview Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #0a0a0f;
    --surface: #14141b;
    --border: #1e1e2a;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #a78bfa;
    --accent-hover: #c4b5fd;
    --green: #34d399;
  }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* -- Sidebar -- */
  .sidebar {
    width: 320px;
    min-width: 320px;
    height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .sidebar-header p {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Controls */
  .controls {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  .view-btn {
    flex: 1;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .view-btn:hover:not(.active) {
    border-color: var(--accent);
    color: var(--text);
  }

  /* Option list */
  .option-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .option-list::-webkit-scrollbar { width: 4px; }
  .option-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .option-item {
    padding: 14px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .option-item:hover {
    background: rgba(167,139,250,0.06);
    border-color: var(--border);
  }
  .option-item.selected {
    background: rgba(167,139,250,0.1);
    border-color: var(--accent);
  }
  .option-item .opt-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .option-item .opt-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    min-width: 22px;
  }
  .option-item .opt-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .option-item .opt-colors {
    display: flex;
    gap: 5px;
    margin-left: 32px;
  }
  .color-dot {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* -- Preview Area -- */
  .preview-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .preview-header {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 48px;
  }
  .preview-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
  }
  .preview-title span {
    color: var(--text);
    font-weight: 600;
  }
  .preview-actions {
    display: flex;
    gap: 8px;
  }
  .action-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--green);
    background: transparent;
    color: var(--green);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .action-btn:hover {
    background: var(--green);
    color: #000;
  }

  .preview-frame-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: var(--bg);
  }
  .preview-frame-wrap.mobile-view iframe {
    width: 375px;
    max-width: 375px;
    border-radius: 20px;
    box-shadow: 0 0 0 8px #1a1a24, 0 20px 60px rgba(0,0,0,0.5);
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 8px;
    background: #000;
    transition: width 0.3s, max-width 0.3s, border-radius 0.3s;
  }

  /* -- Empty state -- */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    gap: 12px;
  }
  .empty-state .icon {
    font-size: 48px;
    opacity: 0.3;
  }
  .empty-state p {
    font-size: 14px;
    text-align: center;
    line-height: 1.6;
  }
  .empty-state .hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    opacity: 0.6;
  }

  /* -- Loading -- */
  .loading {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .loading .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.4s infinite;
  }
  .loading .dot:nth-child(2) { animation-delay: 0.2s; }
  .loading .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  /* Mobile responsive */
  @media (max-width: 768px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; min-width: auto; height: auto; max-height: 200px; }
    .option-list { display: flex; overflow-x: auto; overflow-y: hidden; padding: 8px; gap: 8px; }
    .option-item { min-width: 160px; flex-shrink: 0; margin-bottom: 0; }
    .preview-frame-wrap { padding: 8px; }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>Design Gallery</h1>
    <p id="previewCount">loading...</p>
  </div>
  <div class="controls">
    <button class="view-btn active" data-view="desktop" onclick="setView('desktop')">Desktop</button>
    <button class="view-btn" data-view="mobile" onclick="setView('mobile')">Mobile</button>
  </div>
  <div class="option-list" id="optionList">
    <div class="loading">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      waiting for previews...
    </div>
  </div>
</aside>

<main class="preview-area">
  <div class="preview-header">
    <div class="preview-title" id="previewTitle">Select a design option</div>
    <div class="preview-actions" id="previewActions" style="display:none">
      <button class="action-btn" onclick="openInNewTab()">New Tab</button>
    </div>
  </div>
  <div class="preview-frame-wrap" id="frameWrap">
    <div class="empty-state" id="emptyState">
      <div class="icon">&#x1F3A8;</div>
      <p>텔레그램에서 카피 승인 후<br>아트봇이 프리뷰를 생성하면 여기에 표시됩니다</p>
      <span class="hint">auto-refresh every 3s</span>
    </div>
  </div>
</main>

<script>
  let currentFile = null;
  let currentView = 'desktop';
  let previews = [];

  async function fetchPreviews() {
    try {
      const res = await fetch('/api/previews');
      const data = await res.json();
      if (JSON.stringify(data) !== JSON.stringify(previews)) {
        previews = data;
        renderList();
      }
    } catch { /* retry */ }
  }

  function renderList() {
    const list = document.getElementById('optionList');
    const count = document.getElementById('previewCount');
    count.textContent = `${previews.length} previews`;

    if (previews.length === 0) {
      list.innerHTML = `<div class="loading">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        waiting for previews...
      </div>`;
      return;
    }

    list.innerHTML = previews.map((p, i) => `
      <div class="option-item ${p.file === currentFile ? 'selected' : ''}"
           onclick="selectPreview(${i})">
        <div class="opt-header">
          <span class="opt-id">${p.id}</span>
          <span class="opt-name">${p.name}</span>
        </div>
        <div class="opt-colors">
          ${p.colors.map(c => `<div class="color-dot" style="background:${c}"></div>`).join('')}
        </div>
      </div>
    `).join('');
  }

  function selectPreview(idx) {
    const p = previews[idx];
    if (!p) return;
    currentFile = p.file;

    // Update list selection
    document.querySelectorAll('.option-item').forEach((el, i) => {
      el.classList.toggle('selected', i === idx);
    });

    // Update preview
    const wrap = document.getElementById('frameWrap');
    const empty = document.getElementById('emptyState');
    const title = document.getElementById('previewTitle');
    const actions = document.getElementById('previewActions');

    if (empty) empty.remove();

    let iframe = wrap.querySelector('iframe');
    if (!iframe) {
      iframe = document.createElement('iframe');
      wrap.appendChild(iframe);
    }
    iframe.src = p.file;

    title.innerHTML = `${p.id} <span>${p.name}</span>`;
    actions.style.display = 'flex';
  }

  function setView(view) {
    currentView = view;
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === view);
    });
    document.getElementById('frameWrap').classList.toggle('mobile-view', view === 'mobile');
  }

  function openInNewTab() {
    if (currentFile) window.open(currentFile, '_blank');
  }

  // Auto-refresh every 3 seconds
  fetchPreviews();
  setInterval(fetchPreviews, 3000);
</script>
</body>
</html>
